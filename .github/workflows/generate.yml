name: Veo 3 → Drive Pending

on:
  workflow_dispatch:
  schedule:
    # daily 6:00 AM UTC (chaaho to change kar sakte ho)
    - cron: "0 6 * * *"

jobs:
  generate-video:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Repo checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai google-api-python-client google-auth requests

      # 4️⃣ Generate Veo video and upload to Drive (pending)
      - name: Generate Veo 3 video → Drive pending (OAuth)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          PENDING_FOLDER_ID: ${{ secrets.PENDING_FOLDER_ID }}
        run: |
          python scripts/generate_veo_to_pending.py
